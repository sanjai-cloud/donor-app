{% extends 'base.html' %}

{% block title %}Login - Donor Connector{% endblock %}

{% block content %}
<div class="auth-wrapper animate-fade-in">
    <div class="card auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Login to your Donor Connector account</p>
        </div>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--primary-color); font-weight: 500;">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
